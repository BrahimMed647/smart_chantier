# Railway configuration — root of the repository.
# Railway reads this file to know how to build and deploy the Django backend.
#
# IMPORTANT: In the Railway dashboard, set the "Root Directory" to:
#   django_backend/django_backend
# That way the build commands below do NOT need "cd" prefixes.

[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info --access-logfile -"
healthcheckPath = "/health/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
