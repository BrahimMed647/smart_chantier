[build]
builder = "nixpacks"
# 1. Install Python dependencies
# 2. Copy the pre-built Flutter web files into django's flutter_web folder
# 3. Collect all static files
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
# Run migrations then start gunicorn
startCommand = "python manage.py migrate --noinput && python manage.py seed_demo && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info --access-logfile -"

healthcheckPath = "/health/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
