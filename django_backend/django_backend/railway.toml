[build]
builder = "nixpacks"
# Install dependencies, collect static files.
# Migrations run at start (not build) so the DB is available.
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
# Run migrations first, then start gunicorn.
startCommand = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info --access-logfile -"

# Railway checks this URL to confirm the app is running.
healthcheckPath = "/health/"
healthcheckTimeout = 100

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
